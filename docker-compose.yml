version: "3.9"

services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "${PORT}:3000"
    volumes:
      - .:/app
    depends_on:
      - db
    command: sh start.sh

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
